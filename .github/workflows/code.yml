name: code

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CC: gcc

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gerc
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.89.0"]
    steps:
      - name: Check out GERC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: gerc

      - name: Check out PARC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: follang/lang-c
          ref: ba603cdccc9375473eca0c42e5462cf90b6da249
          path: parc

      - name: Check out LINC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: follang/linc
          ref: 37c8fb16171114b39e2283ff4b9e351fa2d5975b
          path: linc

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${{ matrix.toolchain }}" --profile minimal --component clippy --component rustfmt
          rustup default "${{ matrix.toolchain }}"

      - name: Install native prerequisites
        run: sudo apt-get update && sudo apt-get install --yes binutils build-essential clang libasound2-dev libcurl4-openssl-dev libncurses-dev libpcap-dev libpng-dev libssl-dev libx11-dev libxml2-dev x11proto-dev zlib1g-dev

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@948b432f0fddb61de0806565a7222b36e12e2ee3 # v2.0.0
        with:
          mdbook-version: "0.5.3"

      - name: Verify
        run: make verify
