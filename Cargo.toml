[package]
name = "gec"
version = "0.1.0"
edition = "2021"
authors = ["Trim Bresilla"]
description = "Rust projection layer in the PARC/LINC pipeline — generates Rust FFI bindings from C analysis"
license = "MIT/Apache-2.0"
keywords = ["c", "ffi", "bindings", "codegen"]
categories = ["development-tools::ffi", "code-generation"]

[dependencies]
linc = { path = "../linc" }
serde = { version = "1", features = ["derive"] }
serde_json = "=1.0.145"

[dev-dependencies]
parc = { path = "../parc" }
